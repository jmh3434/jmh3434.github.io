<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    background: #141517;
    font-family: 'DM Sans', -apple-system, sans-serif;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 390px;
    background: #1c1d21;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #2a2b30;
  }

  /* Header */
  .header {
    padding: 40px 30px 24px;
    background: linear-gradient(180deg, #22232a 0%, #1c1d21 100%);
  }
  .header-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .photo {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #2a2b30;
  }
  .location-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 12px;
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    font-size: 12px;
    color: #8a8b92;
    font-weight: 500;
  }
  .location-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3dd68c;
  }
  .name {
    font-size: 26px;
    font-weight: 700;
    color: #f0f0f2;
    letter-spacing: -0.3px;
    line-height: 1.2;
  }
  .role {
    font-size: 15px;
    color: #7c7d85;
    margin-top: 3px;
    font-weight: 400;
  }

  /* About */
  .about {
    padding: 0 30px;
    margin-bottom: 20px;
  }
  .about-text {
    font-size: 14px;
    line-height: 1.55;
    color: #9a9ba3;
  }

  /* Skills row */
  .skills {
    padding: 0 30px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .skill {
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    color: #b0b1b9;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
  }

  /* Divider */
  .divider {
    height: 1px;
    background: #2a2b30;
    margin: 0 30px;
  }

  /* Contact */
  .contact {
    padding: 20px 30px 28px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 14px;
    border-radius: 12px;
    text-decoration: none;
    transition: background 0.15s;
  }
  .contact-item:hover { background: rgba(255,255,255,0.04); }
  .contact-item:active { background: rgba(255,255,255,0.06); }
  .ci-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .ci-icon svg { width: 18px; height: 18px; }
  .ci-icon.phone { background: rgba(61,214,140,0.12); }
  .ci-icon.phone svg { stroke: #3dd68c; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .ci-icon.email { background: rgba(45,108,223,0.12); }
  .ci-icon.email svg { stroke: #2d6cdf; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .ci-icon.linkedin { background: rgba(10,102,194,0.12); }
  .ci-icon.linkedin svg { fill: #0a66c2; }
  .ci-info { display: flex; flex-direction: column; }
  .ci-label {
    font-size: 11px;
    font-weight: 600;
    color: #5a5b63;
    text-transform: uppercase;
    letter-spacing: 0.6px;
  }
  .ci-value {
    font-size: 15px;
    font-weight: 500;
    color: #e0e0e4;
    margin-top: 1px;
  }

  /* Footer */
  .footer {
    border-top: 1px solid #2a2b30;
    padding: 16px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(0,0,0,0.15);

  .edu {
    font-size: 13px;
    color: #5a5b63;
  }
  .edu strong {
    color: #8a8b92;
    font-weight: 600;
  }
  .year {
    font-size: 12px;
    color: #44454d;
    font-weight: 500;
