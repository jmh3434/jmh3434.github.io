<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    background: #141517;
    font-family: 'DM Sans', -apple-system, sans-serif;
    padding: 24px;
    -webkit-font-smoothing: antialiased;
  }

  .card {
    width: 100%;
    max-width: 390px;
    background: #1c1d21;
    border-radius: 20px;
    overflow: hidden;
    border: 1px solid #2a2b30;
  }

  /* Header - centered, clean */
  .header {
    padding: 44px 30px 28px;
    text-align: center;
    background: linear-gradient(180deg, #22232a 0%, #1c1d21 100%);
  }
  .photo {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid #2a2b30;
    margin-bottom: 16px;
  }
  .name {
    font-size: 26px;
    font-weight: 700;
    color: #f0f0f2;
    letter-spacing: -0.3px;
  }
  .role {
    font-size: 15px;
    color: #7c7d85;
    margin-top: 3px;
  }
  .location {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    margin-top: 8px;
    font-size: 13px;
    color: #5a5b63;
  }
  .location-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #3dd68c;
  }

  /* What I Build */
  .services {
    padding: 0 30px;
    margin-bottom: 24px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .service {
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #b0b1b9;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.07);
  }

  /* Save Contact CTA */
  .save-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin: 0 30px 12px;
    padding: 14px 20px;
    background: #2d6cdf;
    border-radius: 14px;
    text-decoration: none;
    transition: background 0.15s;
  }
  .save-btn:active { background: #2560c7; }
  .save-btn svg { width: 20px; height: 20px; stroke: #fff; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .save-btn span { font-size: 15px; font-weight: 600; color: #fff; }

  /* Share button */
  .share-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 0 30px 24px;
    padding: 11px 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .share-btn:active { background: rgba(255,255,255,0.1); }
  .share-btn svg { width: 16px; height: 16px; stroke: #6a6b73; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .share-btn span { font-size: 13px; font-weight: 500; color: #6a6b73; }
  .share-btn.hidden { display: none; }

  /* Divider */
  .divider { height: 1px; background: #2a2b30; margin: 0 30px; }

  /* Contact rows */
  .contact {
    padding: 16px 22px 20px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .contact-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 11px 12px;
    border-radius: 12px;
    text-decoration: none;
    transition: background 0.15s;
  }
  .contact-item:active { background: rgba(255,255,255,0.06); }
  .ci-icon {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .ci-icon svg { width: 17px; height: 17px; }
  .ci-icon.green { background: rgba(61,214,140,0.12); }
  .ci-icon.green svg { stroke: #3dd68c; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .ci-icon.blue { background: rgba(45,108,223,0.12); }
  .ci-icon.blue svg { stroke: #2d6cdf; fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .ci-icon.li { background: rgba(10,102,194,0.12); }
  .ci-icon.li svg { fill: #0a66c2; }
  .ci-value {
    font-size: 14px;
    font-weight: 500;
    color: #d0d0d4;
  }

  /* Footer */
  .footer {
    border-top: 1px solid #2a2b30;
    padding: 14px 30px;
    text-align: center;
    background: rgba(0,0,0,0.15);
    font-size: 12px;
    color: #44454d;
  }
  .footer strong { color: #6a6b73; font-weight: 600; }
</style>
